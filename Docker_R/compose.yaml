services:
  seurat:
    image: rnakato/shortcake_seurat:${TAG}
    build:
      context: .
      dockerfile: Dockerfile.Seurat
      secrets:
        - github_pat

  r:
    image: rnakato/shortcake_r:${TAG}
    build:
      context: .
      dockerfile: Dockerfile.R
      secrets:
        - github_pat

secrets:
  github_pat:
    environment: GITHUB_PAT