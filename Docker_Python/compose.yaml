services:
  light:
    image: rnakato/shortcake_light:${TAG}
    build:
      context: .
      dockerfile: Dockerfile.light
      secrets:
        - github_pat

  default:
    image: rnakato/shortcake:${TAG}
    build:
      context: .
      dockerfile: Dockerfile.default
      secrets:
        - github_pat

  full:
    image: rnakato/shortcake_full:${TAG}
    build:
      context: .
      dockerfile: Dockerfile.full
      secrets:
        - github_pat

  scvi:
    image: rnakato/shortcake_scvi:${TAG}
    build:
      context: .
      dockerfile: Dockerfile.scVI
      secrets:
        - github_pat

  rapidsc:
    image: rnakato/shortcake_rapidsc:${TAG}
    build:
      context: .
      dockerfile: Dockerfile.rapidsc
      secrets:
        - github_pat
  
secrets:
  github_pat:
    environment: GITHUB_PAT